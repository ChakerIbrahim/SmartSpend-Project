<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
  <title>Network</title>
</head>

<body>
  <div class="container">
    <div class="topbar">Network</div>
    <h1 class="title">Your Feed</h1>

    <div class="content">
      <div class="profile-card">
        <img src="user-circle.png" alt="avatar" class="avatar">
        <a href="#">Add an avatar</a>
        <h2>James Doe</h2>
      </div>

      <div class="feed">
        <div class="post">
          <div class="post-top">
            <div class="post-name">Neil M</div>
            <div class="likes-area">
              <span class="like"> 9 like(s)</span>
              <button class="like-btn" onclick="addLike(this)">Like</button>
            </div>
          </div>
          <p>
            I just set up this new discord bot, let me know what you think.
            <a href="#">link</a>
          </p>
        </div>

        <div class="post">
          <div class="post-top">
            <div class="post-name">Nichole K</div>
            <div class="likes-area">
              <span class="like">12 like(s)</span>
              <button class="like-btn" onclick="addLike(this)">Like</button>
            </div>
          </div>
          <p>
            Just finished my <a href="#">next comic</a>, check it out.
          </p>
        </div>

        <div class="post">
          <div class="post-top">
            <div class="post-name">Jim R</div>
            <div class="likes-area">
              <span class="like">9 like(s)</span>
              <button class="like-btn" onclick="addLike(this)">Like</button>
            </div>
          </div>
          <p>
            I can't stop listening to the <a href="#">new album.</a> 
            Who else is liking it?
          </p>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
