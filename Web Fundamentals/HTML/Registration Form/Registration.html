<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <h1>
        Registration Form
    </h1>
    <div>
        <label for="First Name">First Name:*</label>
        <input type="text">
    </div>
    <br>
    <div>
        <label for="Last Name">Last Name:*</label>
        <input type="text">
    </div>
    <br>
    <div>
        <label for="Email">Email Address:*</label>
        <input type="email" name="" id="">
    </div>
    <br>
    <div>
        <label for="Password">Password:*</label>
        <input type="password" name="" id="">
    </div>
    <br>
    <div>
        <label for="Password">Confirm Password:*</label>
        <input type="password" name="" id="">
    </div>
    <br>
    <div>
        <label for="Birthday">Birthday</label>
        <input type="date" name="" id="">
    </div>
    <br>
    <div>
        <label for="Gender">Gender Identity:</label>
        <br>
        <input type="radio" name="#" id="#">
        <label for="Male">Male</label>
        <input type="radio" name="#" id="#">
        <label for="Female">Female</label>
        <input type="radio" name="#" id="#">
        <label for="Non-Binary">Non-Binary</label>
        <input type="radio" name="#" id="#">
        <label for="I prefer Not To Answer ">I prefer Not To Answer </label>
    </div>
    <br>
    <div>
        <label for="text">A short description about myself</label><br>
        <textarea name="#" id="#" placeholder="A short description about yourself ..."
        style="width: 209px;height: 103px;"></textarea>
    </div>
    <br>
    <div>
        <label for="#">Favorite Language:</label>
        <select name="Favorite Language" id="#">
            <option>Javascript</option>
            <option>HTML</option>
            <option>CSS</option>
        </select>
    </div>
    <br>
    <div>
    <input type="checkbox" name="#" id="#">
    <label for="#">Yes , I would like to receive periodic email updates </label>
    </div>
    <br>
    <div>
       <input type="submit" value="Create Account">
    </div>
    <br>
    <div>
        <label for="#">* Indicates a required field</label>
    </div>

</body>

</htm>
