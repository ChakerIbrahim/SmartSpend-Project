<!DOCTYPE html>
<html>
<head>
    <title>Playground</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .box {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            border: 3px solid black;
        }
    </style>
</head>
<body>

    <h1>Welcome!</h1>

    <div class="container">
        {% for i in range(x) %}
            <div class="box" style="background-color: {{ color }};"></div>
        {% endfor %}
    </div>

</body>
</html>
