<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Result</title>
</head>

<body class="bg-gray-200 flex justify-center items-center h-screen">

    <div class="bg-gray-100 border-4 border-black p-8 w-[550px]">

        <h1 class="text-2xl font-bold underline mb-6">
            Submitted Info
        </h1>

        <div class="space-y-3 text-xl">

            <p>
                <span class="font-bold">Name:</span>
                {{ name }}
            </p>

            <p>
                <span class="font-bold">Dojo Location:</span>
                {{ location }}
            </p>

            <p>
                <span class="font-bold">Favorite Language:</span>
                {{ language }}
            </p>

            <p>
                <span class="font-bold">Comment:</span>
                {{ comment }}
            </p>

        </div>

        <div class="flex justify-end mt-10">

            <a
                href="/"
                class="bg-cyan-500 text-white border-2 border-black px-5 py-1 shadow-[3px_3px_0px_black]"
            >
                Go Back
            </a>

        </div>

    </div>

</body>
</html>
