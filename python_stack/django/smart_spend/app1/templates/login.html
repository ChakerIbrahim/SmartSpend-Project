{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartSpend X</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" href="{% static 'image/favicon.png' %}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D9E75',
                        'primary-dark': '#178a65',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#182130] text-[#b8d5d9] min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-[#0d1018] rounded-2xl shadow-xl overflow-hidden border border-[#1e2d40]">

    <div class="p-8">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4">
                <i data-lucide="wallet" class="w-8 h-8 text-primary"></i>
            </div>

            <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
            <p class="text-[#b8d5d9] mt-2">Manage your expenses with ease</p>
        </div>

        <form action="{% url 'login' %}" method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="email" class="block text-sm font-medium mb-1">Email Address</label>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>

                    <input type="email" id="email" name="email" required
                        class="block w-full pl-10 pr-3 py-2.5 bg-[#141b26] border border-[#1e2d40] rounded-xl text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="name@example.com">
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label for="password" class="block text-sm font-medium">Password</label>

                    <a href="{% url 'forgot_password' %}"
                       class="text-sm font-semibold text-primary hover:text-primary-dark">
                        Forgot Password?
                    </a>
                </div>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>

                    <input type="password" id="password" name="password" required
                        class="block w-full pl-10 pr-10 py-2.5 bg-[#141b26] border border-[#1e2d40] rounded-xl text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="••••••••">

                    <button type="button" onclick="togglePassword()"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-300">
                        <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" name="remember"
                    class="h-4 w-4 bg-[#141b26] border-[#1e2d40] text-primary rounded focus:ring-primary">

                <label for="remember" class="ml-2 block text-sm">Remember me</label>
            </div>

            <button type="submit"
                class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Sign In</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>

            <div class="mt-6 text-center text-xs text-[#b8d5d9]">
                Secure email and password login is enabled for this demo.
            </div>
        </form>

        <p class="mt-8 text-center text-sm">
            Don't have an account?
            <a href="{% url 'register' %}" class="font-bold text-primary hover:text-primary-dark">
                Create an Account
            </a>
        </p>

    </div>
</div>

<script>
    lucide.createIcons();

    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.setAttribute('data-lucide', 'eye-off');
        } else {
            passwordInput.type = 'password';
            eyeIcon.setAttribute('data-lucide', 'eye');
        }

        lucide.createIcons();
    }
</script>

</body>
</html>
