{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SmartSpend X</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" href="{% static 'image/favicon.png' %}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D9E75',
                        'primary-dark': '#178a65',
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-[#182130] text-[#b8d5d9] min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-[#0d1018] rounded-2xl shadow-xl overflow-hidden border border-[#1e2d40]">

    <div class="p-8">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4">
                <i data-lucide="shield-check" class="w-8 h-8 text-primary"></i>
            </div>

            <h1 class="text-2xl font-bold text-white">Reset Password</h1>
            <p class="text-[#b8d5d9] mt-2">Create a strong password to protect your account.</p>
        </div>

        <form id="reset-form" action="{% url 'reset_password' %}" method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="password" class="block text-sm font-medium mb-1">New Password</label>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>

                    <input type="password" id="password" name="password" required
                        oninput="checkStrength(this.value)"
                        class="block w-full pl-10 pr-3 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="••••••••">
                </div>

                <div class="mt-2 flex items-center gap-1">
                    <div id="strength-1" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                    <div id="strength-2" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                    <div id="strength-3" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                    <div id="strength-4" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                </div>
            </div>

            <div>
                <label for="confirm-password" class="block text-sm font-medium mb-1">
                    Confirm New Password
                </label>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>

                    <input type="password" id="confirm-password" name="confirm_password" required
                        class="block w-full pl-10 pr-3 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Reset Password</span>
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
        </form>

        <div id="success-state" class="hidden text-center py-4">
            <div class="bg-[#141b26] border border-[#1e2d40] rounded-xl p-6 mb-6">
                <div class="flex justify-center mb-4">
                    <div class="bg-primary/20 p-2 rounded-full">
                        <i data-lucide="check" class="w-8 h-8 text-primary"></i>
                    </div>
                </div>

                <h3 class="text-lg font-bold text-white mb-2">Password Updated</h3>

                <p class="text-sm text-[#b8d5d9]">
                    Your password has been reset successfully. You can now log in with your new password.
                </p>
            </div>

            <a href="{% url 'login' %}"
                class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Sign In Now</span>
                <i data-lucide="log-in" class="w-4 h-4"></i>
            </a>
        </div>

    </div>

</div>

<script>
    lucide.createIcons();

    function checkStrength(password) {
        let strength = 0;

        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/\d/)) strength++;
        if (password.match(/[^a-zA-Z\d]/)) strength++;

        const bars = [
            document.getElementById('strength-1'),
            document.getElementById('strength-2'),
            document.getElementById('strength-3'),
            document.getElementById('strength-4')
        ];

        bars.forEach(bar => {
            bar.className = 'h-1.5 w-full rounded-full bg-gray-700';
        });

        const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];

        if (strength > 0) {
            for (let i = 0; i < strength; i++) {
                bars[i].className = `h-1.5 w-full rounded-full ${colors[strength - 1]}`;
            }
        }
    }

    function handleSuccess(e) {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
            alert('Passwords do not match');
            return;
        }

        document.getElementById('reset-form').classList.add('hidden');
        document.getElementById('success-state').classList.remove('hidden');

        lucide.createIcons();
    }
</script>

</body>
</html>
