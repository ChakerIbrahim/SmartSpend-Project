<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Show</title>
</head>
<body>
    <h1>Add a New Show</h1>
    <form action="/shows/create" method="POST">
        {%csrf_token%}
        <label for="text">Title</label>
        <input type="text" name="title"><br><br>
        <label for="text">Network</label>
        <input type="text" name="network"><br><br>
        <label for="text">Release Date</label>
        <input type="date" name="release_date"><br><br>
        <label for="text">Description</label>
        <textarea name="desc"></textarea><br><br>
        <button type="submit">CREATE</button>
    </form><br><br>
    <a href="/shows/">Go Back</a>
</body>
</html>
