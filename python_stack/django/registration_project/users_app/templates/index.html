<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>

    <h1>Welcome to Home Page</h1>

    {% if user.is_authenticated %}
        <h3>Hello, {{ user.username }}</h3>
        <a href="/logout/">Logout</a>
    {% else %}
        <a href="/register/">Register</a>
        <br><br>
        <a href="/login/">Login</a>
    {% endif %}

</body>
</html>
