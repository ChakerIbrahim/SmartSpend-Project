<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>

<h1>Task Manager</h1>

<a href="/tasks/new/">Add New Task</a>

<hr>

{% for task in task %}
    <h3>{{ task.title }}</h3>

    {% if task.is_completed %}
        <p>Status: Completed</p>
    {% else %}
        <p>Status: Not Completed</p>
    {% endif %}

    <a href="/tasks/{{ task.id }}/">View</a>
    <a href="/tasks/{{ task.id }}/edit/">Edit</a>
    <a href="/tasks/{{ task.id }}/delete/">Delete</a>

    <hr>
{% endfor %}

</body>
</html>
