<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
</head>
<body>

<h1>Add New Task</h1>

<form action="/tasks/create/" method="POST">
    {% csrf_token %}

    <p>Title:</p>
    <input type="text" name="title">

    <p>Description:</p>
    <textarea name="description"></textarea>

    <p>
        Completed:
        <input type="checkbox" name="is_completed">
    </p>

    <button type="submit">Create Task</button>
</form>

<a href="/">Back</a>

</body>
</html>
