<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <title>Result</title>
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">

          <div class="card shadow p-4">
            <h1 class="text-center mb-4">Submitted Info</h1>

            <!-- Name -->
            <div class="mb-3">
              <h5>Name:</h5>
              <p class="form-control">{{name}}</p>
            </div>

            <!-- Location -->
            <div class="mb-3">
              <h5>Dojo Location:</h5>
              <p class="form-control">{{location}}</p>
            </div>

            <!-- Favorite Language -->
            <div class="mb-3">
              <h5>Favorite Language:</h5>
              <p class="form-control">{{fav_language}}</p>
            </div>

            <!-- Comment -->
            <div class="mb-3">
              <h5>Comment:</h5>
              <p class="form-control">{{comment}}</p>
            </div>

            <!-- Experience -->
            <div class="mb-3">
              <h5>Experienced:</h5>
              <p class="form-control">{{exp}}</p>
            </div>

            <!-- Languages -->
            <div class="mb-3">
              <h5>Languages:</h5>
              <p class="form-control">
                {% for item in lang %}
                  {{item}}
                {% endfor %}
              </p>
            </div>

            <!-- Button -->
            <form action="/">
              <div class="d-grid">
                <button class="btn btn-primary">
                  Go Back
                </button>
              </div>
            </form>

          </div>

        </div>
      </div>
    </div>
  </body>
</html>
