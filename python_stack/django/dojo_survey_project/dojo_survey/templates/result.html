<!DOCTYPE html>
<html lang="en">
    <head>

    <meta charset="UTF-8" />
    <title>Result</title>
    </head>
    <body>
    <form action="/">
        <div>
            <h1>Submitted Info</h1>

        <div>
        <div>
          <p>Name:</p>
          <p>{{name}}</p>
        </div>

        <div>
          <p>Dojo Location:</p>
          <p>{{location}}</p>
        </div>

        <div>
          <p>Favorite Language:</p>
          <p>{{fav_language}}</p>
        </div>

        <div>
          <p >Comment:</p>
          <p >{{comment}}</p>
        </div>

        <div>
          <p>Experienced:</p>
          <p>{{exp}}</p>
        </div>

        <div>
          <p>Languages:</p>
          <p>
            {% for item in lang %}
            {{item}}
            {% endfor %}
          </p>
        </div>
      </div>

        <div>
          <button>Go Back</button>
        </div>
      </form>
    </div>
  </body>
</html>
