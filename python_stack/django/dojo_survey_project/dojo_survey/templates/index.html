<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <title>Dojo Survey</title>
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">

          <div class="card shadow p-4">
            <h2 class="text-center mb-4">Dojo Survey</h2>

            <form action="/result" method="post">
              {% csrf_token %}

              <!-- Name -->
              <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  class="form-control"
                />
              </div>

              <!-- Location -->
              <div class="mb-3">
                <label for="location" class="form-label">
                  Dojo Location
                </label>

                <select
                  name="location"
                  id="location"
                  class="form-select"
                >
                  <option value="San Jose">San Jose</option>
                  <option value="San Francisco">San Francisco</option>
                  <option value="Los Angeles">Los Angeles</option>
                </select>
              </div>

              <!-- Favorite Language -->
              <div class="mb-3">
                <label for="fav-lang" class="form-label">
                  Favorite Language
                </label>

                <select
                  name="fav-lang"
                  id="fav-lang"
                  class="form-select"
                >
                  <option value="Java">Java</option>
                  <option value="Python">Python</option>
                  <option value="PHP">PHP</option>
                </select>
              </div>

              <!-- Experience -->
              <div class="mb-3">
                <p class="fw-bold">Have any Experience?</p>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    id="experienced"
                    name="answer"
                    value="Yes"
                  />

                  <label class="form-check-label" for="experienced">
                    Yes
                  </label>
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    id="not_experienced"
                    name="answer"
                    value="No"
                  />

                  <label class="form-check-label" for="not_experienced">
                    No
                  </label>
                </div>
              </div>

              <!-- Languages -->
              <div class="mb-3">
                <p class="fw-bold">What do you speak?</p>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="arabic"
                    name="Lang"
                    value="Arabic"
                  />

                  <label class="form-check-label" for="arabic">
                    Arabic
                  </label>
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="english"
                    name="Lang"
                    value="English"
                  />

                  <label class="form-check-label" for="english">
                    English
                  </label>
                </div>
              </div>

              <!-- Comments -->
              <div class="mb-3">
                <label for="comments" class="form-label">
                  Comment (optional)
                </label>

                <textarea
                  class="form-control"
                  name="comments"
                  id="comments"
                  rows="3"
                ></textarea>
              </div>

              <!-- Submit -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  Submit
                </button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
