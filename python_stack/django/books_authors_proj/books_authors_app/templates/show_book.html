<!DOCTYPE html>
<html>
<head>
    <title>Book Details</title>
</head>
<body>

    <!-- Display book information -->
    <h1>{{ book.title }}</h1>

    <p><strong>ID:</strong> {{ book.id }}</p>
    <p><strong>Description:</strong> {{ book.desc }}</p>

    <hr>

    <!-- Display all authors connected to this book -->
    <h2>Authors</h2>

    <ul>
        {% for author in book.authors.all %}
            <li>{{ author.first_name }} {{ author.last_name }}</li>
        {% empty %}
            <li>No authors added yet.</li>
        {% endfor %}
    </ul>

    <hr>

    <!-- Form to add an author to this book -->
    <h2>Add Author to Book</h2>

    <form action="/books/{{ book.id }}/add_author" method="POST">
        {% csrf_token %}

        <select name="author_id">
            {% for author in available_authors %}
                <option value="{{ author.id }}">
                    {{ author.first_name }} {{ author.last_name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Add</button>
    </form>

    <br>

    <a href="/books">Back to Books</a>

</body>
</html>
