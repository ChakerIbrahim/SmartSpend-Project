{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartSpend X</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" href="{% static 'image/favicon.png' %}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D9E75',
                        'primary-dark': '#178a65',
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-[#182130] text-[#b8d5d9] min-h-screen flex items-center justify-center p-4">

<div class="max-w-lg w-full bg-[#0d1018] rounded-2xl shadow-xl overflow-hidden border border-[#1e2d40] my-8">

    <div class="p-8">

        <div class="text-center mb-8">

            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4">
                <i data-lucide="user-plus" class="w-8 h-8 text-primary"></i>
            </div>

            <h1 class="text-2xl font-bold text-white">Create Account</h1>

            <p class="text-[#b8d5d9] mt-2">
                Join SmartSpend X today
            </p>

        </div>

        <form action="{% url 'register' %}" method="POST" class="space-y-4">

            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium mb-1">
                        Full Name
                    </label>

                    <input type="text"
                           name="fullname"
                           required
                           class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                           placeholder="John Doe">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           required
                           class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                           placeholder="johndoe123">
                </div>

            </div>

            <div>
                <label class="block text-sm font-medium mb-1">
                    Email Address
                </label>

                <input type="email"
                       name="email"
                       required
                       class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                       placeholder="name@example.com">
            </div>

            <div>

                <label class="block text-sm font-medium mb-1">
                    Password
                </label>

                <input type="password"
                       id="password"
                       name="password"
                       required
                       oninput="checkStrength(this.value)"
                       class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                       placeholder="••••••••">

                <div class="mt-2 flex items-center gap-1">
                    <div id="strength-1" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                    <div id="strength-2" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                    <div id="strength-3" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                    <div id="strength-4" class="h-1.5 w-full rounded-full bg-gray-700"></div>
                </div>

                <p id="strength-text"
                   class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-wider">
                    Strength: Weak
                </p>

            </div>

            <div>

                <label class="block text-sm font-medium mb-1">
                    Confirm Password
                </label>

                <input type="password"
                       name="confirm_password"
                       required
                       class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                       placeholder="••••••••">

            </div>

            <div class="flex items-start py-2">

                <input type="checkbox"
                       required
                       class="mt-1 h-4 w-4 bg-[#141b26] border-[#1e2d40] text-primary rounded">

                <label class="ml-2 block text-sm">
                    I agree to the
                    <a href="#" class="text-primary font-semibold hover:underline">
                        Terms & Conditions
                    </a>
                </label>

            </div>

            <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">

                <span>Create Account</span>

                <i data-lucide="check-circle" class="w-4 h-4"></i>

            </button>

        </form>

        <p class="mt-8 text-center text-sm">

            Already have an account?

            <a href="{% url 'login' %}"
               class="font-bold text-primary hover:text-primary-dark">

                Sign In

            </a>

        </p>

    </div>

</div>

<script>
    lucide.createIcons();

    function checkStrength(password) {

        let strength = 0;

        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/\d/)) strength++;
        if (password.match(/[^a-zA-Z\d]/)) strength++;

        const bars = [
            document.getElementById('strength-1'),
            document.getElementById('strength-2'),
            document.getElementById('strength-3'),
            document.getElementById('strength-4')
        ];

        const text = document.getElementById('strength-text');

        bars.forEach(bar => {
            bar.className = 'h-1.5 w-full rounded-full bg-gray-700';
        });

        const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];

        if (strength > 0) {

            for (let i = 0; i < strength; i++) {
                bars[i].className = `h-1.5 w-full rounded-full ${colors[strength - 1]}`;
            }

            text.innerText = `Strength: ${labels[strength - 1]}`;

        } else {

            text.innerText = 'Strength: Weak';

        }
    }
</script>

</body>
</html>
