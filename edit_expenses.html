{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#070b16] text-white min-h-screen">

<div class="absolute top-0 left-0 w-96 h-96 bg-blue-500/20 blur-[140px] rounded-full"></div>
<div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-500/20 blur-[140px] rounded-full"></div>

<section class="relative z-10 px-6 lg:px-20 pt-24 pb-20">

    <div class="max-w-2xl mx-auto bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-xl shadow-2xl">

        <span class="px-4 py-2 rounded-full bg-blue-500/10 text-blue-400 text-sm">
            Edit Expense
        </span>

        <h1 class="text-5xl font-bold mt-6 mb-8">Update Expense</h1>

        <form method="POST" action="{% url 'update_expense' expense.id %}" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block mb-3 text-gray-300">Expense Title</label>
                <input type="text" name="title" value="{{ expense.title }}" required
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block mb-3 text-gray-300">Amount</label>
                <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block mb-3 text-gray-300">Category</label>
                <select name="category" required
                    class="w-full bg-[#111827] border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500">
                    <option value="{{ expense.category }}">{{ expense.category }}</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div>
                <label class="block mb-3 text-gray-300">Date</label>
                <input type="date" name="date" value="{{ expense.date|date:'Y-m-d' }}" required
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500">
            </div>

            <div class="flex gap-4">
                <button type="submit"
                    class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-500 to-purple-600 hover:scale-[1.02] duration-300 font-semibold">
                    Save Changes
                </button>

                <a href="{% url 'all_expenses' %}"
                   class="w-full text-center py-4 rounded-2xl bg-white/10 hover:bg-white/20 duration-300 font-semibold">
                    Cancel
                </a>
            </div>

        </form>
    </div>

</section>

</body>
</html>
