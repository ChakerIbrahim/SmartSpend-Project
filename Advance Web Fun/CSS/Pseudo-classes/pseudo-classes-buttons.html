<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo-classes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Interactive Button playground</h1>
        <div class="buttons">
            <button class="btn hover-btn">Hover Me</button>
            <button class="btn press-btn">Press Me</button>
            <button class="btn focus-btn">Focus On Me</button>
            <button class="btn grow-btn">Hover to Grow</button>
            <button class="btn disabled-btn" disabled>Disabled Button</button>
        </div>
    </div>
</body>

</html>
