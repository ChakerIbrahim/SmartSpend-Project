<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonts</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mystery+Quest&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=fire">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Sofia&effect=neon|outline|emboss|shadow-multiple">
</head>

<body>
    <h1>A Web-Safe Main Heading</h1>
    <h2 class="mystery-quest-regular">Custom Font Subheading</h2>
    <p class="font-effect-fire">This paragraph uses a Google Font.</p>
    <p class="font-effect-neon">This second paragraph uses another Google Font.</p>
    <small class="mono-text">This is small monospace text.</small>
</body>

</html>
