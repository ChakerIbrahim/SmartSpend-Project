<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marvel Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="container">
    <div class="navbar">

      <h1 class="neon-text">Marvel</h1>

      <ul class="nav-links">
        <li><a href="#" class="hover-underline">Home</a></li>
        <li><a href="#" class="hover-underline">Categories</a></li>
        <li><a href="#" class="hover-underline">Most Read</a></li>
        <li><a href="#" class="hover-underline">About</a></li>
      </ul>

    </div>
  </nav>

  <main class="container">

    <section class="controls">

      <div class="search-box">
        <input type="text" placeholder="Search stories...">
        <button class="glow-on-hover">Search</button>
      </div>

      <div class="filters">
        <button class="glow-on-hover">All</button>
        <button class="glow-on-hover">Adventure</button>
        <button class="glow-on-hover">Action</button>
        <button class="glow-on-hover">Fantasy</button>
        <button class="glow-on-hover">Magic</button>
      </div>

    </section>

    <section class="story-grid">

      <div class="story-card featured">
        <img src="photo/Spider.webp">
        <div class="story-title">Spider Man</div>
      </div>

      <div class="story-card">
        <img src="photo/iron.webp">
        <div class="story-title">Iron Man</div>
      </div>

      <div class="story-card">
        <img src="photo/Captain US.avif">
        <div class="story-title">Captain America</div>
      </div>

      <div class="story-card">
        <img src="photo/Hulk.jpg">
        <div class="story-title">Hulk</div>
      </div>

      <div class="story-card">
        <img src="photo/thor2.webp">
        <div class="story-title">Thor</div>
      </div>

      <div class="story-card">
        <img src="photo/captain marvel.jpg">
        <div class="story-title">Captain Marvel</div>
      </div>

      <div class="story-card">
        <img src="photo/doctor-strange.avif">
        <div class="story-title">Doctor Strange</div>
      </div>

      <div class="story-card">
        <img src="photo/black.jpg">
        <div class="story-title">Black Panther</div>
      </div>

      <div class="story-card">
        <img src="photo/Wolverine_(circa_2024).jpg">
        <div class="story-title">Wolverine</div>
      </div>

      <div class="story-card">
        <img src="photo/Ryan_Reynolds_as_Deadpool_2016.jpg">
        <div class="story-title">Deadpool</div>
      </div>

    </section>

  </main>

</body>

</html>
