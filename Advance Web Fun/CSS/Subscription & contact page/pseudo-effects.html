<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription & Contact Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Subscription Plans</h1>

    <div class="plans">
      <div class="card" tabindex="0">
        <h3>Starter</h3>
        <div class="price">$9/mo</div>
        <ul class="features">
          <li>5 Projects included</li>
          <li>Email Support</li>
          <li>Single User License</li>
        </ul>
      </div>

      <div class="card" tabindex="0">
        <h3>Professional</h3>
        <div class="price">$19/mo</div>
        <ul class="features">
          <li>25 Projects</li>
          <li>Priority Support</li>
          <li>Team Access</li>
        </ul>
      </div>

      <div class="card" tabindex="0">
        <h3>Enterprise</h3>
        <div class="price">$49/mo</div>
        <ul class="features">
          <li>Unlimited Projects</li>
          <li>24/7 Support</li>
          <li>Advanced Tools</li>
        </ul>
      </div>
    </div>

    <h2>Contact Us</h2>

    <div class="contact-wrap">
      <div class="contact-box">
        <form>
          <input type="text" placeholder="Full Name" required minlength="3" />
          <input type="email" placeholder="Email Address" required />
          <textarea placeholder="Your Message..." required minlength="10"></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
