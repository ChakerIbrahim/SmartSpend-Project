<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Shadows</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sidebar">
    <h1>Dashboard</h1>

    <div class="menu">
      <a class="active">Overview</a>
      <a>Analytics</a>
      <a>Engagement</a>
      <a>Messages</a>
      <a>Settings</a>
    </div>
  </div>

  <div class="main">
    <div class="title">Overview</div>

    <div class="cards">
      <div class="card soft">
        <h2>Revenue</h2>
        <p>$4,280</p>
        <small>+12% from yesterday</small>
      </div>

      <div class="card deep">
        <p>New Users</p>
        <h3>182</h3>
        <small>+8% this week</small>
      </div>

      <div class="card layered">
        <h2>Orders</h2>
        <p><span class="bold-para">97</span></p>
        <small>Last 24 hours</small>
      </div>

      <div class="card soft">
        <h2 class="highlight">Active Users</h2>
        <p><span class="bold-para">1624</span> currently online</p>
        <small>Average session: <span class="bold-para">12 min</span></small>
      </div>

      <div class="card inset">
        <h2>Messages</h2>
        <p>You have <span class="bold-para">14 unread</span> messages</p>
        <small>Last message: <span class="bold-para">3 min ago</span></small>
      </div>

    </div>
  </div>

</body>
</html>
