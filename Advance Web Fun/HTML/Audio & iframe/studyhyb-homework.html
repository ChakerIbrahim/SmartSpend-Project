<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studyhub-Homework</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>StudyHub</h1>
        <img src="user-circle.png" alt="user-logo">
    </header>

  <div class="container">
    <aside class="sidebar">
      <h2>StudyHub</h2>
      <ul class="menu">
        <li>🏠 Home</li>
        <li>📊 My Results</li>
        <li>📝 Submissions</li>
        <li class="active">📚 Homeworks</li>
        <li>⚙️ Settings</li>
      </ul>
    </aside>

  
    <main class="content">
      
      <section class="card">
        <div class="section-title">🎧 Teacher Explanation</div>
        <div class="section-subtitle">Listen to the homework instructions.</div>
        <audio src="Kevin-MacLeod-Investigations(chosic.com).mp3" controls></audio>
      </section>

      <section class="card">
        <div class="section-title">📄 Homework Document</div>
        <div class="section-subtitle">Your homework file:</div>
        <iframe
          class="pdf-frame"
          src="Jalil Wasaya-CV.pdf" >
        </iframe>
      </section>
    </main>
</body>

</html>
