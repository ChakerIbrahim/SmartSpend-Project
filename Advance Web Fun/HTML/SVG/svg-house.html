<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SVG House</title>
</head>

<body>

    <svg width="500" height="1000">
        <!-- circle  cx cy center position r for size  fill= Inside color  stroke=border color sw= thickness of border -->
        <circle cx="350" cy="50" r="30" fill="yellow" stroke="orange" stroke-width="3" />
        <!-- x = horizontal y = vertical width&height -->
        <rect x="120" y="120" width="160" height="120" fill="brown" stroke="black" />
        <!-- points =  botton left - top  - bottom right -->
        <polygon points="120,120 200,60 280,120" fill="#ef142b" stroke="black" />
        <rect x="180" y="170" width="40" height="70" fill="#955e64" stroke="black" />
        <rect x="140" y="140" width="30" height="30" fill="red" stroke="black" />
        <rect x="230" y="140" width="30" height="30" fill="red" stroke="black" />
        <rect x="50" y="180" width="20" height="60" fill="brown" />
        <circle cx="60" cy="160" r="30" fill="#b7c46a" />
        <circle cx="80" cy="60" r="20" fill="lightgray" />
        <circle cx="100" cy="60" r="25" fill="lightgray" />
        <circle cx="120" cy="60" r="20" fill="lightgray" />
        <line x1="0" y1="240" x2="400" y2="240" stroke="green" stroke-width="4" />
      <circle cx="200" cy="500" r="180" fill="#7D3C8C" />
  <text 
    x="90" 
    y="520" 
    font-size="60"
    font-family="Arial, sans-serif"
    fill="white"
    letter-spacing="6">
    AXSOS
    </svg>

</body>

</html>
