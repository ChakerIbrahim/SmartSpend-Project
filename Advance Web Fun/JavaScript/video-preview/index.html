<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoLab</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- top navigation -->
    <div class="top">
        <div class="nav-container">
            <h1>VideoLab</h1>
            <input type="text" placeholder="Search" name="query" class="search">
            <button class="btn">Login</button>
        </div>
    </div>

    <!-- main content -->
    <div class="flex-container">

        <!-- left column -->
        <div class="col-l">
            <video src="videos/ocean.mp4" width="720" height="400" controls onmouseover= "playVideo(this)" 
            onmouseout="pauseVideo(this)" ></video>

            <div class="row">
                <div class="start">
                    <h1>"Where Power Meets Nature"</h1>
                    <h3>2.3M Views | March, 16, 2026</h3>
                    <div class="user">
                        <img src="Jalil Photo.jpg" alt="user-circle" class="avatar-s">
                        <span class="user-name">Jalil Wasaya</span>
                    </div>
                </div>
                <button class="btn" onclick="alert('PayAttention')">Subscribe</button>
            </div>

        </div>

        <!-- right column -->
        <div class="col-r">

            <h3 class="sub-header">Up Next</h3>

            <div class="video-small">
                <video src="videos/sea.mp4" width="168" class="vid-s" controls></video>" 
                <span class="video-title">"Waves of Freedom"</span>
            </div>

            <div class="video-small">
                <video src="videos/sample.mp4" controls height="113" class="vid-s"></video>
                <span class="video-title">"Riding the Waves"</span>
            </div>

            <div class="video-small">
                <video src="videos/flower.mp4" width="168" height="113" controls class="vid-s"></video>
                <span class="video-title">"The power of nature"</span>
            </div>

            <div class="video-small">
              <video src="videos/Surfing.mp4" controls class="vid-s"></video> 
                <span class="video-title">"Surfing Beyond Limits"</span>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
