<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Household Expense Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D9E75',
                        'primary-dark': '#178a65',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-[#182130] font-sans text-[#b8d5d9] min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-[#0d1018] rounded-2xl shadow-xl overflow-hidden border border-[#1e2d40]">

        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4">
                    <i data-lucide="key-round" class="w-8 h-8 text-primary"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Forgot Password?</h1>
                <p class="text-[#b8d5d9] mt-2">No worries, we'll send you reset instructions.</p>
            </div>

            <form id="forgot-form" onsubmit="handleReset(event)" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-[#b8d5d9] mb-1">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </div>
                        <input type="email" id="email" name="email" required
                            class="block w-full pl-10 pr-3 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-500"
                            placeholder="name@example.com">
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span>Send Reset Link</span>
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </form>

            <div id="success-message" class="hidden text-center py-4">
                <div class="bg-[#141b26] border border-[#1e2d40] rounded-xl p-6 mb-6">
                    <div class="flex justify-center mb-4">
                        <div class="bg-primary/20 p-2 rounded-full">
                            <i data-lucide="check-circle" class="w-8 h-8 text-primary"></i>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-2">Email Sent!</h3>
                    <p class="text-sm text-[#b8d5d9]">We've sent a password reset link to <span id="sent-email"
                            class="font-bold text-white">your email</span>. Please check your inbox.</p>
                </div>
                <button onclick="window.location.reload()"
                    class="text-primary font-semibold hover:text-primary-dark transition-colors text-sm">Didn't receive
                    the email? Try again</button>
            </div>

            <div class="mt-8 text-center">
                <a href="login.html"
                    class="inline-flex items-center gap-2 text-sm font-bold text-[#b8d5d9] hover:text-primary transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function handleReset(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            document.getElementById('sent-email').innerText = email;

            // Hide form and show success message
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');

            lucide.createIcons();
        }
    </script>
</body>

</html>
