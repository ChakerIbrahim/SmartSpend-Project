<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Household Expense Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        'primary-dark': '#5a52d4',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">

        <div class="p-8">
            <!-- App Logo & Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4">
                    <i data-lucide="shield-check" class="w-8 h-8 text-primary"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
                <p class="text-gray-500 mt-2">Create a strong password to protect your account.</p>
            </div>

            <!-- Reset Form -->
            <form id="reset-form" onsubmit="handleSuccess(event)" class="space-y-5">
                <!-- New Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="password" name="password" required
                            oninput="checkStrength(this.value)"
                            class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-400"
                            placeholder="••••••••">
                    </div>
                    <!-- Strength Indicator -->
                    <div class="mt-2 flex items-center gap-1">
                        <div id="strength-1" class="h-1.5 w-full rounded-full bg-gray-200 transition-colors"></div>
                        <div id="strength-2" class="h-1.5 w-full rounded-full bg-gray-200 transition-colors"></div>
                        <div id="strength-3" class="h-1.5 w-full rounded-full bg-gray-200 transition-colors"></div>
                        <div id="strength-4" class="h-1.5 w-full rounded-full bg-gray-200 transition-colors"></div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New
                        Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="confirm-password" name="confirm-password" required
                            class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-400"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span>Reset Password</span>
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </form>

            <!-- Success State (Hidden by default) -->
            <div id="success-state" class="hidden text-center py-4">
                <div class="bg-green-50 border border-green-100 rounded-xl p-6 mb-6">
                    <div class="flex justify-center mb-4">
                        <div class="bg-green-100 p-2 rounded-full">
                            <i data-lucide="check" class="w-8 h-8 text-green-600"></i>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-green-900 mb-2">Password Updated</h3>
                    <p class="text-sm text-green-700">Your password has been reset successfully. You can now log in with
                        your new password.</p>
                </div>
                <a href="login.html"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span>Sign In Now</span>
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[^a-zA-Z\d]/)) strength++;

            const bars = [
                document.getElementById('strength-1'),
                document.getElementById('strength-2'),
                document.getElementById('strength-3'),
                document.getElementById('strength-4')
            ];

            bars.forEach(bar => bar.className = 'h-1.5 w-full rounded-full bg-gray-200 transition-colors');
            const colors = ['bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-500'];

            if (strength > 0) {
                for (let i = 0; i < strength; i++) {
                    bars[i].className = `h-1.5 w-full rounded-full ${colors[strength - 1]} transition-colors`;
                }
            }
        }

        function handleSuccess(e) {
            e.preventDefault();
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
            lucide.createIcons();
        }
    </script>
</body>

</html>
