<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Household Expense Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D9E75',
                        'primary-dark': '#178a65',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-[#182130] font-sans text-[#b8d5d9] min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-[#0d1018] rounded-2xl shadow-xl overflow-hidden border border-[#1e2d40] my-8">

        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4">
                    <i data-lucide="user-plus" class="w-8 h-8 text-primary"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Create Account</h1>
                <p class="text-[#b8d5d9] mt-2">Join thousands of households managing smarter</p>
            </div>

            <form action="#" method="POST" class="space-y-4">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="fullname" class="block text-sm font-medium text-[#b8d5d9] mb-1">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required
                            class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-500"
                            placeholder="John Doe">
                    </div>
                    <div>
                        <label for="username" class="block text-sm font-medium text-[#b8d5d9] mb-1">Username</label>
                        <input type="text" id="username" name="username" required
                            class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-500"
                            placeholder="johndoe123">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-[#b8d5d9] mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-500"
                        placeholder="name@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-[#b8d5d9] mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required
                            oninput="checkStrength(this.value)"
                            class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-500"
                            placeholder="••••••••">
                    </div>
                    <div class="mt-2 flex items-center gap-1">
                        <div id="strength-1" class="h-1.5 w-full rounded-full bg-gray-700 transition-colors"></div>
                        <div id="strength-2" class="h-1.5 w-full rounded-full bg-gray-700 transition-colors"></div>
                        <div id="strength-3" class="h-1.5 w-full rounded-full bg-gray-700 transition-colors"></div>
                        <div id="strength-4" class="h-1.5 w-full rounded-full bg-gray-700 transition-colors"></div>
                    </div>
                    <p id="strength-text" class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-wider">
                        Strength: Weak</p>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-[#b8d5d9] mb-1">Confirm
                        Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required
                        class="block w-full px-4 py-2.5 bg-[#141b26] border border-[#1e2d40] text-white rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder-gray-500"
                        placeholder="••••••••">
                </div>

                <div class="flex items-start py-2">
                    <input type="checkbox" id="terms" name="terms" required
                        class="mt-1 h-4 w-4 bg-[#141b26] border-[#1e2d40] text-primary rounded focus:ring-primary">
                    <label for="terms" class="ml-2 block text-sm text-[#b8d5d9]">
                        I agree to the <a href="#" class="text-primary font-semibold hover:underline">Terms &
                            Conditions</a> and <a href="#" class="text-primary font-semibold hover:underline">Privacy
                            Policy</a>.
                    </label>
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span>Create Account</span>
                    <i data-lucide="check-circle" class="w-4 h-4"></i>
                </button>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-[#1e2d40]"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-[#0d1018] text-[#b8d5d9] uppercase tracking-wider text-xs font-medium">Or join
                            with</span>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <button type="button"
                        class="flex items-center justify-center py-2.5 border border-[#1e2d40] bg-[#141b26] rounded-xl hover:bg-[#182130] transition-colors">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    </button>
                    <button type="button"
                        class="flex items-center justify-center py-2.5 border border-[#1e2d40] bg-[#141b26] rounded-xl hover:bg-[#182130] transition-colors">
                        <img src="https://www.svgrepo.com/show/475633/apple-color.svg" class="w-5 h-5 filter brightness-125" alt="Apple">
                    </button>
                    <button type="button"
                        class="flex items-center justify-center py-2.5 border border-[#1e2d40] bg-[#141b26] rounded-xl hover:bg-[#182130] transition-colors">
                        <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5"
                            alt="Facebook">
                    </button>
                </div>
            </form>

            <p class="mt-8 text-center text-sm text-[#b8d5d9]">
                Already have an account?
                <a href="login.html" class="font-bold text-primary hover:text-primary-dark transition-colors">Sign
                    In</a>
            </p>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Password Strength Checker Logic
        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[^a-zA-Z\d]/)) strength++;

            const bars = [
                document.getElementById('strength-1'),
                document.getElementById('strength-2'),
                document.getElementById('strength-3'),
                document.getElementById('strength-4')
            ];
            const text = document.getElementById('strength-text');

            // Reset colors
            bars.forEach(bar => bar.className = 'h-1.5 w-full rounded-full bg-gray-700 transition-colors');

            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];

            if (strength > 0) {
                for (let i = 0; i < strength; i++) {
                    bars[i].className = `h-1.5 w-full rounded-full ${colors[strength - 1]} transition-colors`;
                }
                text.innerText = `Strength: ${labels[strength - 1]}`;
                text.className = `text-[10px] mt-1 uppercase font-bold tracking-wider ${strength === 4 ? 'text-green-500' : 'text-gray-400'}`;
            } else {
                text.innerText = 'Strength: Weak';
                text.className = 'text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-wider';
            }
        }
    </script>
</body>

</html>
