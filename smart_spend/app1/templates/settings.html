<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Smart Spend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#182130',          /* Background matching your layout theme */
                        card: '#0d1018',        /* Container background */
                        inner: '#141b26',       /* Deep card internal input panel wrapper */
                        border: '#1e2d40',      /* Sharp panel grid separation borders */
                        safe: '#1D9E75',
                        danger: '#A32D2D',
                        'danger-bg': '#2a1a1a',
                        'danger-border': '#5a2020',
                        'danger-text': '#f09595',
                        muted: '#b8d5d9',       /* Restored text color palette */
                        light: '#e0e0e0',
                    },
                    fontFamily: {
                        serif: ['"Noto Serif"', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * {
            font-family: "Noto Serif", serif;
        }
    </style>
</head>
<body class="bg-bg text-muted min-h-screen flex flex-col justify-between py-10 px-4 md:px-16">

    <main class="max-w-7xl mx-auto w-full flex-1 flex flex-col">
        <section class="w-full bg-card p-6 md:p-10 rounded-2xl border border-border shadow-xl flex-1 flex flex-col justify-between">
            
            <div>
                <div class="flex justify-between items-center border-b border-border pb-4 mb-8">
                    <h2 class="text-3xl font-bold text-white">Settings</h2>
                    <a href="analytics.html" class="rounded-[20px] p-[0.6rem] px-6 text-white bg-[#443e45] border-2 border-[#b3b2b6] text-[18px] cursor-pointer hover:bg-[#575058] transition-colors text-center inline-block whitespace-nowrap">
                        ← Back
                    </a>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    
                    <div class="flex flex-col gap-6">
                        <div class="bg-inner border border-border rounded-[10px] px-6 py-5 flex-1 flex flex-col justify-between gap-4">
                            <div>
                                <p class="text-white text-[13px] font-semibold mb-4">User Info</p>
                                <div class="flex flex-col gap-1.5 mb-4">
                                    <label for="username" class="text-muted text-xs">Username</label>
                                    <input type="text" id="username" value="Jalil Wasaya" 
                                        class="bg-inner border border-border rounded-lg px-3 py-2.5 text-white text-sm outline-none w-full focus:border-safe transition-colors">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label for="email" class="text-muted text-xs">Email</label>
                                    <input type="email" id="email" value="jalil.wasaya@example.com" 
                                        class="bg-inner border border-border rounded-lg px-3 py-2.5 text-white text-sm outline-none w-full focus:border-safe transition-colors">
                                </div>
                            </div>
                        </div>

                        <div class="bg-inner border border-border rounded-[10px] px-6 py-5 flex-1 flex flex-col justify-between gap-4">
                            <div>
                                <p class="text-white text-[13px] font-semibold mb-4">Change Password</p>
                                <div class="flex flex-col gap-1.5 mb-4">
                                    <label for="Current-Password" class="text-muted text-xs">Current Password</label>
                                    <input type="password" id="Current-Password" placeholder="••••••••" 
                                        class="bg-inner border border-border rounded-lg px-3 py-2.5 text-white text-sm outline-none w-full focus:border-safe transition-colors">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label for="New-Password" class="text-muted text-xs">New Password</label>
                                    <input type="password" id="New-Password" placeholder="••••••••" 
                                        class="bg-inner border border-border rounded-lg px-3 py-2.5 text-white text-sm outline-none w-full focus:border-safe transition-colors">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-6">
                        <div class="bg-inner border border-border rounded-[10px] px-6 py-5 flex-1 flex flex-col justify-between gap-4">
                            <div>
                                <p class="text-white text-[13px] font-semibold mb-4">Preferences</p>
                                <div class="flex flex-col gap-1.5 mb-4">
                                    <label for="currency" class="text-muted text-xs">Currency</label>
                                    <select name="currency" id="currency" 
                                        class="bg-inner border border-border rounded-lg px-3 py-2.5 text-white text-sm outline-none w-full cursor-pointer focus:border-safe transition-colors">
                                        <option value="ILS">ILS ₪</option>
                                        <option value="USD">USD $</option>
                                        <option value="EURO">Euro €</option>
                                    </select>
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label for="Language" class="text-muted text-xs">Language</label>
                                    <select name="Language" id="Language" 
                                        class="bg-inner border border-border rounded-lg px-3 py-2.5 text-white text-sm outline-none w-full cursor-pointer focus:border-safe transition-colors">
                                        <option value="english">English</option>
                                        <option value="arabic">Arabic</option>
                                        <option value="spanish">Spanish</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="bg-inner border border-border rounded-[10px] px-6 py-5 flex-1 flex flex-col justify-between gap-4">
                            <div>
                                <p class="text-white text-[13px] font-semibold mb-4">Notifications</p>
                                <div class="flex justify-between items-center py-1 mb-2">
                                    <div class="flex flex-col">
                                        <span class="text-white text-sm font-medium">Email Alerts</span>
                                        <span class="text-muted text-xs">Receive weekly summaries</span>
                                    </div>
                                    <input type="checkbox" checked class="w-4 h-4 accent-safe cursor-pointer">
                                </div>
                                <div class="flex justify-between items-center py-1 border-t border-border/50 pt-3">
                                    <div class="flex flex-col">
                                        <span class="text-white text-sm font-medium">Bill Reminders</span>
                                        <span class="text-muted text-xs">Get alerted 3 days before due date</span>
                                    </div>
                                    <input type="checkbox" checked class="w-4 h-4 accent-safe cursor-pointer">
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="bg-danger-bg border border-danger-border rounded-[10px] px-6 py-5">
                    <p class="text-danger-text text-[13px] font-semibold mb-1.5">Danger zone</p>
                    <p class="text-muted text-xs mb-3.5">This will permanently delete your account and all expense data.</p>
                    <button class="bg-danger text-white border-none rounded-lg px-5 py-2.5 text-[13px] font-bold cursor-pointer hover:bg-[#8b2424] transition-colors">
                        Delete Account
                    </button>
                </div>

            </div>

            <footer id="footer" class="border-t border-white/10 pt-6 mt-12 text-center text-slate-500 text-sm">
                © 2026 SmartSpend X — Built by Jalil Wasaya
            </footer>

        </section>
    </main>

</body>
</html>
